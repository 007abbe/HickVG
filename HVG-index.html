<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Hick-Neutralizer</title>
<style>
  :root {
    --bg: #0d0221;
    --hot: #ff2e88;
    --cyan: #00f0ff;
    --acid: #c6ff00;
    --gold: #ffd400;
    --purple: #b06bff;
    --ink: #f4eaff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    touch-action: none;
    background: #0d0221;
  }
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 12px 16px;
    pointer-events: none;
    font-weight: bold;
    letter-spacing: 1px;
    z-index: 5;
  }
  .panel {
    background: rgba(13,2,33,0.55);
    border: 1px solid rgba(255,46,136,0.4);
    border-radius: 6px;
    padding: 7px 11px;
    backdrop-filter: blur(2px);
  }
  .label { font-size: 9px; opacity: .7; text-transform: uppercase; letter-spacing:1px;}
  .big { font-size: 20px; color: var(--cyan); }
  #hearts { font-size: 18px; color: var(--hot); letter-spacing: 2px; }
  .bar-wrap {
    margin-top: 5px; width: 150px; height: 11px;
    border-radius: 6px; overflow: hidden; background: rgba(0,0,0,0.4);
  }
  #charge-wrap { border: 1px solid var(--gold); }
  #charge-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--gold), var(--hot));
    transition: width .15s ease-out;
  }
  #booster-wrap { border: 1px solid var(--acid); }
  #booster-bar {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--cyan), var(--acid));
    transition: width .12s ease-out;
  }
  .bar-text { font-size: 9px; margin-top: 3px; }
  #charge-text { color: var(--gold); }
  #booster-text { color: var(--acid); }
  #boost-tag {
    position: absolute; top: 92px; left: 50%;
    transform: translateX(-50%);
    font-size: 24px; font-weight: bold;
    color: var(--acid); text-shadow: 0 0 18px var(--acid);
    opacity: 0; pointer-events: none; letter-spacing: 3px;
    z-index: 5; white-space: nowrap;
  }
  #wave-banner {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: clamp(26px, 8vw, 56px); font-weight: bold;
    color: var(--cyan); text-shadow: 0 0 24px var(--cyan), 3px 3px 0 var(--hot);
    opacity: 0; pointer-events: none; z-index: 5; text-align:center;
    letter-spacing: 2px;
  }
  /* Mobile D-pad */
  #dpad {
    position: absolute;
    left: 22px; bottom: 26px;
    width: 168px; height: 168px;
    display: none;
    z-index: 6;
    pointer-events: none;
  }
  body.touch #dpad { display: block; }
  .dbtn {
    position: absolute;
    width: 54px; height: 54px;
    background: rgba(0,240,255,0.14);
    border: 2px solid var(--cyan);
    border-radius: 10px;
    color: var(--cyan);
    font-family: inherit; font-weight: bold; font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    pointer-events: auto;
  }
  .dbtn.active { background: rgba(0,240,255,0.45); }
  #d-up    { left: 57px; top: 0; }
  #d-left  { left: 0;   top: 57px; }
  #d-right { left: 114px; top: 57px; }
  #d-down  { left: 57px; top: 114px; }
  #aim-hint {
    position: absolute;
    right: 18px; bottom: 30px;
    width: 150px;
    text-align: center;
    font-size: 11px; line-height:1.4;
    color: var(--acid);
    opacity: .85;
    display: none;
    z-index: 6;
    pointer-events: none;
  }
  body.touch #aim-hint { display: block; }
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    background: rgba(13,2,33,0.85);
    backdrop-filter: blur(3px);
    z-index: 10; padding: 24px;
  }
  .screen.hidden { display: none; }
  h1 {
    font-size: clamp(28px, 7vw, 60px); line-height: 1.05;
    color: var(--hot);
    text-shadow: 0 0 24px var(--hot), 4px 4px 0 var(--cyan);
    margin-bottom: 10px;
  }
  .sub { color: var(--cyan); font-size: 13px; letter-spacing: 2px; margin-bottom: 24px; }
  .rules {
    max-width: 440px; font-size: 13px; line-height: 1.7;
    opacity: .92; margin-bottom: 26px; text-align: left;
  }
  .rules b { color: var(--gold); }
  .rules .key {
    display:inline-block; background:rgba(0,240,255,.15);
    border:1px solid var(--cyan); border-radius:4px;
    padding:0 6px; color:var(--cyan); font-weight:bold;
  }
  button.start {
    font-family: inherit; font-weight: bold; font-size: 17px; letter-spacing: 2px;
    color: var(--bg); background: var(--acid); border: none;
    padding: 14px 32px; border-radius: 8px; cursor: pointer;
    box-shadow: 0 0 24px rgba(198,255,0,0.5); transition: transform .1s;
  }
  button.start:hover { transform: scale(1.05); }
  button.start:active { transform: scale(0.97); }
  button.start:focus-visible { outline: 3px solid var(--cyan); outline-offset: 3px; }
  .final { font-size: 19px; color: var(--gold); margin-bottom: 6px; }
  .gun-name { color: var(--acid); font-style: italic; }
  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="panel">
      <div class="label">Wave</div>
      <div class="big" id="wave">1</div>
      <div id="hearts">♥♥♥♥♥</div>
    </div>
    <div class="panel" style="text-align:center;">
      <div class="label">Hicks</div>
      <div class="big" id="score" style="color:var(--acid)">0</div>
    </div>
    <div class="panel" style="text-align:right;">
      <div class="label">HICK Booster</div>
      <div class="bar-wrap" id="booster-wrap"><div id="booster-bar"></div></div>
      <div class="bar-text" id="booster-text">0 / 10</div>
      <div class="label" style="margin-top:7px;">Super Hick Charge</div>
      <div class="bar-wrap" id="charge-wrap"><div id="charge-bar"></div></div>
      <div class="bar-text" id="charge-text">CHARGING…</div>
    </div>
  </div>

  <div id="boost-tag"></div>
  <div id="wave-banner"></div>

  <!-- Mobile move pad -->
  <div id="dpad">
    <div class="dbtn" id="d-up" data-dir="up">▲</div>
    <div class="dbtn" id="d-left" data-dir="left">◀</div>
    <div class="dbtn" id="d-right" data-dir="right">▶</div>
    <div class="dbtn" id="d-down" data-dir="down">▼</div>
  </div>
  <div id="aim-hint">TAP anywhere to aim &amp; fire <b>hick</b></div>

  <div class="screen" id="title-screen">
    <h1>THE<br>HICK-NEUTRALIZER</h1>
    <div class="sub">▸ SURVIVE THE HICKS ◂</div>
    <div class="rules" id="rules-text"></div>
    <button class="start" id="start-btn">START NEUTRALIZING</button>
  </div>

  <div class="screen hidden" id="over-screen">
    <h1>NEUTRALIZED</h1>
    <div class="final" id="final-score">You survived 0 waves.</div>
    <div class="sub" id="over-flavor"></div>
    <button class="start" id="restart-btn" style="margin-top:22px;">GO AGAIN</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
if (isTouch) document.body.classList.add('touch');

document.getElementById('rules-text').innerHTML = isTouch
  ? `▸ Use the <b>arrow pad</b> (bottom-left) to move in any direction.<br><br>
     ▸ <b>Tap anywhere</b> on the screen to aim and fire the <span class="gun-name">Hick-Neutralizer</span> toward that spot.<br><br>
     ▸ Fill the <b>HICK Booster</b> bar (10 kills in a row) to trigger the <b>HICK BOOSTER</b> — 10s of rapid, piercing fire.<br><br>
     ▸ Fill the <b>SUPER HICK</b> bar and a <b>19.00</b> time-warp drops. Walk into it to neutralize the whole screen.<br><br>
     ▸ A monster touching you costs a <b>♥</b>. You have 5. Survive the waves.`
  : `▸ <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> to move (arrows work too). You face the way you move.<br><br>
     ▸ <span class="key">SPACE</span> fires the <span class="gun-name">Hick-Neutralizer</span> in the direction you're facing. Every shot says <b>hick</b>.<br><br>
     ▸ Fill the <b>HICK Booster</b> bar (10 kills in a row) to trigger the <b>HICK BOOSTER</b> — 10s of rapid, piercing fire. Shots get LOUD: <b>HICK</b>.<br><br>
     ▸ Fill the <b>SUPER HICK</b> bar and a <b>19.00</b> time-warp drops. Walk into it — the clock strikes 19.00 and the screen is neutralized.<br><br>
     ▸ A monster touching you costs a <b>♥</b>. You have 5. Survive as many waves as you can.`;

let W, H, DPR;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', () => { resize(); if (typeof genDeco === 'function') genDeco(); });
resize();

// --- Sprite image objects ---
const imgAim = new Image(); imgAim.src = SPR_AIM;
const imgStand = new Image(); imgStand.src = SPR_STAND;
const imgMon = new Image(); imgMon.src = SPR_MON;
const imgFloor = new Image(); imgFloor.src = SPR_FLOOR;
const imgDeco = new Image(); imgDeco.src = SPR_DECO;
let floorPattern = null;
imgFloor.onload = () => { try { floorPattern = ctx.createPattern(imgFloor, "repeat"); } catch(e){} };

let state = 'title';
let player, monsters, bullets, particles, floaters, timeWarp;
let score, wave, hearts, streak, superCharge, superReady;
let boostUntil, lastFire, invulnUntil, lastTime;
let waveQueue, spawnTimer, spawnGap, betweenWaves, betweenTimer, flashAlpha;

const MONSTER_COLORS = ['#ff2e88', '#00f0ff', '#c6ff00', '#b06bff', '#ff8a3d'];

function reset() {
  player = { x: W/2, y: H/2, dir: -Math.PI/2, moving: false };
  monsters = []; bullets = []; particles = []; floaters = [];
  timeWarp = null;
  score = 0; wave = 0; hearts = 5; streak = 0;
  superCharge = 0; superReady = false;
  boostUntil = 0; lastFire = 0; invulnUntil = 0;
  flashAlpha = 0;
  betweenWaves = true; betweenTimer = 1.2; waveQueue = 0;
  spawnTimer = 0; spawnGap = 0.7;
  updateHUD();
}

function updateHUD() {
  document.getElementById('wave').textContent = Math.max(1, wave);
  document.getElementById('score').textContent = score;
  document.getElementById('hearts').textContent = '♥'.repeat(hearts) + '·'.repeat(5 - hearts);
  // super hick bar
  document.getElementById('charge-bar').style.width =
    Math.min(100, (superCharge / SUPER_REQUIRED) * 100) + '%';
  // hick booster bar — shows progress toward the next ordinary boost
  const prog = streak % ORDINARY_STREAK;
  const boosting = boostActive();
  document.getElementById('booster-bar').style.width =
    (boosting ? 100 : (prog / ORDINARY_STREAK) * 100) + '%';
  document.getElementById('booster-text').textContent =
    boosting ? 'BOOSTED!' : prog + ' / ' + ORDINARY_STREAK;
}

function boostActive() { return performance.now() < boostUntil; }

function startWave() {
  wave++;
  betweenWaves = false;
  waveQueue = 3 + wave * 2;
  spawnGap = Math.max(0.28, 0.75 - wave * 0.03);
  spawnTimer = 0;
  showWaveBanner('WAVE ' + wave);
  updateHUD();
}

function monsterSpeedForWave() {
  return 42 + wave * 5 + Math.random() * 20;
}

function spawnMonster() {
  const edge = (Math.random() * 4) | 0;
  let x, y;
  if (edge === 0) { x = Math.random() * W; y = -24; }
  else if (edge === 1) { x = W + 24; y = Math.random() * H; }
  else if (edge === 2) { x = Math.random() * W; y = H + 24; }
  else { x = -24; y = Math.random() * H; }
  const r = 18 + Math.random() * 12;
  monsters.push({
    x, y, r,
    speed: monsterSpeedForWave(),
    wobble: Math.random() * Math.PI * 2,
    color: MONSTER_COLORS[(Math.random() * MONSTER_COLORS.length) | 0],
    eyes: 1 + ((Math.random() * 3) | 0)
  });
}

function burst(x, y, color, n) {
  if (reduceMotion) n = Math.min(n, 6);
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 60 + Math.random() * 200;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 1, color });
  }
}
function floatText(x, y, text, color, size) {
  floaters.push({ x, y, text, color, size: size||16, life: 1, vy: -46 });
}
function showBoostTag(text) {
  const t = document.getElementById('boost-tag');
  t.textContent = text; t.style.transition='none';
  t.style.opacity='1'; t.style.transform='translateX(-50%) scale(1.25)';
  requestAnimationFrame(() => {
    t.style.transition='opacity 1.2s, transform .3s';
    t.style.transform='translateX(-50%) scale(1)';
    setTimeout(()=>{ t.style.opacity='0'; }, 900);
  });
}
function showWaveBanner(text) {
  const b = document.getElementById('wave-banner');
  b.textContent = text; b.style.transition='none';
  b.style.opacity='1'; b.style.transform='translate(-50%,-50%) scale(1.15)';
  requestAnimationFrame(() => {
    b.style.transition='opacity 1.1s ease, transform .4s';
    b.style.transform='translate(-50%,-50%) scale(1)';
    setTimeout(()=>{ b.style.opacity='0'; }, 800);
  });
}

function tryFire() {
  if (state !== 'playing') return;
  const now = performance.now();
  const cd = boostActive() ? FIRE_COOLDOWN_BOOST : FIRE_COOLDOWN;
  if (now - lastFire < cd) return;
  lastFire = now;
  const boosted = boostActive();
  bullets.push({
    x: player.x + Math.cos(player.dir) * (PLAYER_R + 6),
    y: player.y + Math.sin(player.dir) * (PLAYER_R + 6),
    vx: Math.cos(player.dir) * BULLET_SPEED,
    vy: Math.sin(player.dir) * BULLET_SPEED,
    pierce: boosted,
    r: boosted ? 7 : 5,
    color: boosted ? '#c6ff00' : '#00f0ff',
    life: 1.4
  });
  floatText(player.x + Math.cos(player.dir)*24,
            player.y + Math.sin(player.dir)*24 - 8,
            boosted ? 'HICK' : 'hick',
            boosted ? '#c6ff00' : '#00f0ff',
            boosted ? 22 : 13);
}

function killMonster(i) {
  const m = monsters[i];
  burst(m.x, m.y, m.color, 16);
  floatText(m.x, m.y - m.r, '+1', m.color, 13);
  monsters.splice(i, 1);
  score++; streak++;
  if (!superReady) {
    superCharge++;
    if (superCharge >= SUPER_REQUIRED) { superReady = true; dropTimeWarp(); }
  }
  if (streak > 0 && streak % ORDINARY_STREAK === 0) triggerOrdinaryHick();
  updateHUD();
}

function triggerOrdinaryHick() {
  boostUntil = performance.now() + ORDINARY_MS;
  showBoostTag('HICK BOOSTER!');
}
function dropTimeWarp() {
  let x, y, tries = 0;
  do {
    x = 80 + Math.random() * (W - 160);
    y = 130 + Math.random() * (H - 260);
    tries++;
  } while (Math.hypot(x - player.x, y - player.y) < 140 && tries < 20);
  timeWarp = { x, y, r: 26, t: 0 };
  document.getElementById('charge-text').textContent = '⚠ 19.00 DROPPED — GRAB IT';
}
function triggerSuperHick() {
  showBoostTag('SUPER HICK — 19.00');
  for (const m of monsters) burst(m.x, m.y, m.color, 20);
  score += monsters.length;
  monsters = [];
  floatText(W/2, H/2, 'THE TIME IS 19.00', '#ffd400', Math.min(40, W*0.08));
  timeWarp = null; superReady = false; superCharge = 0;
  document.getElementById('charge-text').textContent = 'CHARGING…';
  if (!reduceMotion) flashAlpha = 0.9;
  updateHUD();
}

// ---- Desktop keyboard ----
const keys = {};
window.addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys[e.key.toLowerCase()] = true;
  if (e.code === 'Space') keys[' '] = true;
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  if (e.code === 'Space') keys[' '] = false;
});

// ---- Mobile D-pad (move) ----
const dpadState = { up:false, down:false, left:false, right:false };
document.querySelectorAll('.dbtn').forEach(btn => {
  const dir = btn.dataset.dir;
  const on = e => { e.preventDefault(); dpadState[dir] = true; btn.classList.add('active'); };
  const off = e => { e.preventDefault(); dpadState[dir] = false; btn.classList.remove('active'); };
  btn.addEventListener('touchstart', on, {passive:false});
  btn.addEventListener('touchend', off, {passive:false});
  btn.addEventListener('touchcancel', off, {passive:false});
  btn.addEventListener('mousedown', on);
  btn.addEventListener('mouseup', off);
  btn.addEventListener('mouseleave', off);
});

// ---- Mobile tap-to-aim-and-fire ----
function aimFireAt(px, py) {
  if (state !== 'playing') return;
  player.dir = Math.atan2(py - player.y, px - player.x);
  // fire immediately, ignoring cooldown so a tap always shoots
  lastFire = 0;
  tryFire();
}
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  if (!t) return;
  const rect = canvas.getBoundingClientRect();
  aimFireAt(t.clientX - rect.left, t.clientY - rect.top);
}, {passive:false});

function update(dt) {
  if (betweenWaves) {
    betweenTimer -= dt;
    if (betweenTimer <= 0) startWave();
  }

  let mx = 0, my = 0;
  if (keys['w'] || keys['arrowup'] || dpadState.up) my -= 1;
  if (keys['s'] || keys['arrowdown'] || dpadState.down) my += 1;
  if (keys['a'] || keys['arrowleft'] || dpadState.left) mx -= 1;
  if (keys['d'] || keys['arrowright'] || dpadState.right) mx += 1;
  const mlen = Math.hypot(mx, my);
  player.moving = mlen > 0;
  if (mlen > 0) {
    mx /= mlen; my /= mlen;
    player.x += mx * PLAYER_SPEED * dt;
    player.y += my * PLAYER_SPEED * dt;
    // On desktop, facing follows movement. On touch, facing is set by tapping.
    if (!isTouch) player.dir = Math.atan2(my, mx);
  }
  player.x = Math.max(PLAYER_R, Math.min(W - PLAYER_R, player.x));
  player.y = Math.max(PLAYER_R, Math.min(H - PLAYER_R, player.y));

  // desktop continuous fire
  if (!isTouch && keys[' ']) tryFire();

  if (!betweenWaves && waveQueue > 0) {
    spawnTimer += dt;
    if (spawnTimer >= spawnGap) { spawnTimer = 0; spawnMonster(); waveQueue--; }
  }
  if (!betweenWaves && waveQueue === 0 && monsters.length === 0) {
    betweenWaves = true; betweenTimer = 2.0;
  }

  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx * dt; b.y += b.vy * dt; b.life -= dt;
    if (b.life <= 0 || b.x < -20 || b.x > W+20 || b.y < -20 || b.y > H+20) {
      bullets.splice(i, 1); continue;
    }
    for (let j = monsters.length - 1; j >= 0; j--) {
      const m = monsters[j];
      if (Math.hypot(b.x - m.x, b.y - m.y) < m.r + b.r) {
        killMonster(j);
        if (!b.pierce) { bullets.splice(i, 1); break; }
      }
    }
  }

  const now = performance.now();
  const invuln = now < invulnUntil;
  for (let i = monsters.length - 1; i >= 0; i--) {
    const m = monsters[i];
    m.wobble += dt * 5;
    const ang = Math.atan2(player.y - m.y, player.x - m.x);
    const wob = Math.sin(m.wobble) * 0.5;
    m.x += Math.cos(ang + wob) * m.speed * dt;
    m.y += Math.sin(ang + wob) * m.speed * dt;
    if (!invuln && Math.hypot(player.x - m.x, player.y - m.y) < PLAYER_R + m.r - 4) {
      hearts--; streak = 0;
      invulnUntil = now + HIT_INVULN_MS;
      burst(player.x, player.y, '#ff2e88', 18);
      floatText(player.x, player.y - 26, '-1 ♥', '#ff2e88', 20);
      m.x -= Math.cos(ang) * 40; m.y -= Math.sin(ang) * 40;
      updateHUD();
      if (hearts <= 0) { gameOver(); return; }
    }
  }

  if (timeWarp) {
    timeWarp.t += dt;
    if (Math.hypot(player.x - timeWarp.x, player.y - timeWarp.y) < PLAYER_R + timeWarp.r) {
      triggerSuperHick();
    }
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx*dt; p.y += p.vy*dt; p.vy += 220*dt; p.life -= dt*1.6;
    if (p.life <= 0) particles.splice(i,1);
  }
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.y += f.vy*dt; f.life -= dt*1.1;
    if (f.life <= 0) floaters.splice(i,1);
  }
  if (flashAlpha > 0) flashAlpha -= dt * 2.2;

  // keep booster bar live even when not killing (boost timer ticking down)
  if (boostActive() || streak % ORDINARY_STREAK !== 0) updateBoosterBarOnly();
}

function updateBoosterBarOnly() {
  const prog = streak % ORDINARY_STREAK;
  const boosting = boostActive();
  document.getElementById('booster-bar').style.width =
    (boosting ? 100 : (prog / ORDINARY_STREAK) * 100) + '%';
  document.getElementById('booster-text').textContent =
    boosting ? 'BOOSTED!' : prog + ' / ' + ORDINARY_STREAK;
}

// scatter positions for grass decorations (generated once per game)
let decoSpots = [];
function genDeco() {
  decoSpots = [];
  const count = Math.floor((W * H) / 90000); // density scales with arena size
  for (let i = 0; i < count; i++) {
    decoSpots.push({
      x: Math.random() * W,
      y: Math.random() * H,
      s: 28 + Math.random() * 22,
      flip: Math.random() < 0.5
    });
  }
}

function drawFloor() {
  if (floorPattern) {
    ctx.fillStyle = floorPattern;
    ctx.fillRect(0, 0, W, H);
  } else {
    // fallback until the texture loads
    ctx.fillStyle = '#16241c';
    ctx.fillRect(0, 0, W, H);
  }
  // darken slightly so neon action pops
  ctx.fillStyle = 'rgba(13,2,33,0.28)';
  ctx.fillRect(0, 0, W, H);

  // scattered grass tufts
  for (const d of decoSpots) {
    ctx.save();
    ctx.globalAlpha = 0.85;
    ctx.translate(d.x, d.y);
    if (d.flip) ctx.scale(-1, 1);
    ctx.drawImage(imgDeco, -d.s/2, -d.s/2, d.s, d.s);
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // arena border
  ctx.strokeStyle = 'rgba(255,46,136,0.55)';
  ctx.lineWidth = 3;
  ctx.strokeRect(2, 2, W-4, H-4);
}

function drawPlayer() {
  const now = performance.now();
  const invuln = now < invulnUntil;
  ctx.save();
  ctx.translate(player.x, player.y);
  if (invuln && Math.floor(now/100) % 2 === 0) ctx.globalAlpha = 0.4;

  // glow ring underneath so the player stays findable on the dark floor
  ctx.shadowColor = boostActive() ? '#c6ff00' : '#00f0ff';
  ctx.shadowBlur = boostActive() ? 26 : 16;
  ctx.fillStyle = boostActive() ? 'rgba(198,255,0,0.18)' : 'rgba(0,240,255,0.16)';
  ctx.beginPath(); ctx.arc(0, 0, PLAYER_R + 4, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;

  // Sprite stays upright. Flip horizontally to match aim left/right.
  const aimingLeft = Math.cos(player.dir) < 0;
  const S = SPRITE_DRAW;
  ctx.save();
  if (aimingLeft) ctx.scale(-1, 1);
  ctx.drawImage(imgAim, -S/2, -S/2, S, S);
  ctx.restore();
  ctx.restore();

  // Gun-direction marker: a glowing barrel/dot pointing exactly where you aim.
  const mx = player.x + Math.cos(player.dir) * (PLAYER_R + 12);
  const my = player.y + Math.sin(player.dir) * (PLAYER_R + 12);
  ctx.save();
  ctx.strokeStyle = boostActive() ? '#c6ff00' : '#00f0ff';
  ctx.lineWidth = 3;
  ctx.shadowColor = ctx.strokeStyle;
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.moveTo(player.x + Math.cos(player.dir) * (PLAYER_R + 2),
             player.y + Math.sin(player.dir) * (PLAYER_R + 2));
  ctx.lineTo(mx, my);
  ctx.stroke();
  ctx.fillStyle = ctx.strokeStyle;
  ctx.beginPath(); ctx.arc(mx, my, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawMonster(m) {
  ctx.save();
  ctx.translate(m.x, m.y);
  // subtle drop shadow so monsters read against the floor
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(0, m.r*0.72, m.r*0.8, m.r*0.3, 0, 0, Math.PI*2);
  ctx.fill();
  // face the player by flipping horizontally
  const facingLeft = (player.x < m.x);
  if (facingLeft) ctx.scale(-1, 1);
  // gentle bob while walking
  const bob = Math.sin(m.wobble) * 2;
  const D = m.r * 2.6; // draw size relative to hit radius
  ctx.drawImage(imgMon, -D/2, -D/2 + bob, D, D);
  ctx.restore();
}
function render() {
  ctx.clearRect(0,0,W,H);
  drawFloor();
  if (boostActive()) { ctx.fillStyle='rgba(198,255,0,0.05)'; ctx.fillRect(0,0,W,H); }

  if (timeWarp) {
    const bob = Math.sin(timeWarp.t*3)*5;
    ctx.save(); ctx.translate(timeWarp.x, timeWarp.y + bob);
    ctx.shadowColor='#ffd400'; ctx.shadowBlur=26;
    ctx.fillStyle='rgba(13,2,33,0.9)'; ctx.strokeStyle='#ffd400'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(0,0,timeWarp.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.shadowBlur=0; ctx.fillStyle='#ffd400';
    ctx.font='bold 14px Courier New'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('19.00',0,0);
    ctx.restore();
  }

  monsters.forEach(drawMonster);
  bullets.forEach(b => {
    ctx.save();
    ctx.shadowColor=b.color; ctx.shadowBlur=10; ctx.fillStyle=b.color;
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
  drawPlayer();

  particles.forEach(p => {
    ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color;
    ctx.fillRect(p.x-2,p.y-2,4,4);
  });
  ctx.globalAlpha=1;
  floaters.forEach(f => {
    ctx.globalAlpha=Math.max(0,f.life); ctx.fillStyle=f.color;
    ctx.font=`bold ${f.size}px Courier New`; ctx.textAlign='center';
    ctx.fillText(f.text,f.x,f.y);
  });
  ctx.globalAlpha=1;

  if (flashAlpha>0){ ctx.fillStyle=`rgba(255,212,0,${Math.max(0,flashAlpha)})`; ctx.fillRect(0,0,W,H); }
}

function loop(now) {
  const dt = Math.min(0.05, (now - lastTime)/1000);
  lastTime = now;
  if (state === 'playing') { update(dt); render(); }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function startGame() {
  reset();
  genDeco();
  document.getElementById('charge-text').textContent = 'CHARGING…';
  document.getElementById('title-screen').classList.add('hidden');
  document.getElementById('over-screen').classList.add('hidden');
  state = 'playing';
  lastTime = performance.now();
}
function gameOver() {
  state = 'over';
  document.getElementById('final-score').textContent =
    `You survived ${wave} wave${wave===1?'':'s'} and neutralized ${score} hick${score===1?'':'s'}.`;
  const flavors = [
    'The hicks got you. Reload and avenge yourself.',
    'So close to 19.00.',
    'They will speak of this neutralizing for years.',
    'Skill issue. Go again.'
  ];
  document.getElementById('over-flavor').textContent = flavors[(Math.random()*flavors.length)|0];
  document.getElementById('over-screen').classList.remove('hidden');
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);
</script>
</body>
